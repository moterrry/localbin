<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localbin - Donate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .donation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .donation-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: transform 0.2s;
        }
        .donation-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }
        .crypto-icon {
            font-size: 32px;
            margin-bottom: 15px;
            display: block;
        }
        .crypto-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }
        .crypto-address {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 13px;
            word-break: break-all;
            margin-bottom: 15px;
            display: block;
            border: 1px solid var(--border-color);
        }
        .copy-btn {
            width: 100%;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <a href="/" class="logo">Local<span>bin</span></a>
            <div class="controls">
                <a href="/" style="text-decoration: none;">
                    <button class="secondary">Back to App</button>
                </a>
            </div>
        </header>

        <div style="text-align: center; margin-top: 40px;">
            <h1 style="font-size: 48px; color: var(--text-primary);">Support <span>Localbin</span></h1>
            <p style="color: var(--text-secondary); margin-top: 15px; max-width: 600px; margin-inline: auto;">
                Localbin is a free, open-source project. If you find it useful, consider supporting our development through cryptocurrency donations.
            </p>
        </div>

        <div class="donation-grid">
            <!-- Bitcoin -->
            <div class="donation-card">
                <span class="crypto-icon">₿</span>
                <span class="crypto-name" style="color: #F7931A;">Bitcoin</span>
                <span class="crypto-address" id="btc-addr">YOUR_BITCOIN_ADDRESS</span>
                <button class="copy-btn" onclick="copyValue('btc-addr')">Copy Address</button>
            </div>

            <!-- Ethereum -->
            <div class="donation-card">
                <span class="crypto-icon">Ξ</span>
                <span class="crypto-name" style="color: #627EEA;">Ethereum</span>
                <span class="crypto-address" id="eth-addr">YOUR_ETHEREUM_ADDRESS</span>
                <button class="copy-btn" onclick="copyValue('eth-addr')">Copy Address</button>
            </div>

            <!-- Litecoin -->
            <div class="donation-card">
                <span class="crypto-icon">Ł</span>
                <span class="crypto-name" style="color: #345D9D;">Litecoin</span>
                <span class="crypto-address" id="ltc-addr">YOUR_LITECOIN_ADDRESS</span>
                <button class="copy-btn" onclick="copyValue('ltc-addr')">Copy Address</button>
            </div>
        </div>
    </div>

    <script>
        function copyValue(id) {
            const text = document.getElementById(id).textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector(`#${id} + button`);
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                btn.style.background = '#28a745';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                }, 2000);
            });
        }
    </script>
</body>
</html>
